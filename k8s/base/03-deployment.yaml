apiVersion: apps/v1
kind: Deployment
metadata:
  name: gelato-api
  namespace: gelato
  labels:
    app.kubernetes.io/name: gelato-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: gelato-recipes-platform
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: gelato-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gelato-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: gelato-recipes-platform
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: api
          image: ghcr.io/94manuel/gelato-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: gelato-api-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gelato-postgres-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 80m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
