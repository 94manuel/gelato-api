name: gelato-api-ci

on:
  push:
    branches: ["main"]
    paths:
      - "gelato-api/**"
      - ".github/workflows/gelato-api-ci.yml"
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

concurrency:
  group: gelato-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push-and-update-gitops:
    name: Build API image and update GitOps tag
    runs-on: ubuntu-latest
    if: "${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'chore(gitops): update gelato-api') }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: gelato-api
        run: npm install

      - name: Validate API build
        working-directory: gelato-api
        run: npm run build

      - name: Set image tag
        id: vars
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: gelato-api
          file: gelato-api/Dockerfile
          push: true
          tags: |
            ghcr.io/94manuel/gelato-api:${{ steps.vars.outputs.image_tag }}
            ghcr.io/94manuel/gelato-api:latest

      - name: Update API production image tag
        run: |
          sed -i "s|newTag: .*|newTag: ${{ steps.vars.outputs.image_tag }}|" gelato-api/k8s/overlays/prod/kustomization.yaml
          git diff -- gelato-api/k8s/overlays/prod/kustomization.yaml

      - name: Commit GitOps API tag
        run: |
          if git diff --quiet -- gelato-api/k8s/overlays/prod/kustomization.yaml; then
            echo "No GitOps change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gelato-api/k8s/overlays/prod/kustomization.yaml
          git commit -m "chore(gitops): update gelato-api image to ${{ steps.vars.outputs.image_tag }}"
          git push
